<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Treks Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    :root { --brand: #1a6b4a; --bg: #f9fafb; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); }
    .admin-header { background: white; padding: 1.5rem 0; border-bottom: 1px solid #e5e7eb; }
    .trek-card { border: 1px solid #e5e7eb; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; background: white; cursor: pointer; transition: box-shadow 0.2s; }
    .trek-card:hover { box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .btn-add { background: var(--brand); color: white; border: none; border-radius: 8px; padding: 0.75rem 1.5rem; font-weight: 500; }
    .btn-edit { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
    .btn-delete { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
    .modal-xl .modal-dialog { max-width: 1000px; }
    .form-label { font-weight: 500; font-size: 0.85rem; color: #374151; margin-bottom: 0.5rem; display: block; }
    .form-control { border-radius: 8px; border: 1px solid #d1d5db; padding: 0.75rem; }
    .form-control:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(26,107,74,0.1); }
    .img-preview { max-width: 250px; max-height: 200px; border-radius: 8px; border: 2px solid #e5e7eb; margin-top: 0.5rem; }
    .array-section { background: #f9fafb; border-radius: 8px; padding: 1rem; margin-top: 1rem; }
    .array-item { display: flex; gap: 0.75rem; align-items: start; padding: 0.75rem 0; border-bottom: 1px solid #e5e7eb; }
    .array-item:last-child { border-bottom: none; }
    .remove-item { background: #fee2e2; color: #dc2626; border: none; border-radius: 6px; padding: 0.25rem 0.5rem; font-size: 0.8rem; cursor: pointer; }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="container mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 style="font-size: 2rem; font-weight: 600; margin: 0;">Trek Management</h1>
      <button class="btn btn-add" onclick="openAddTrek()">
        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Add Trek
      </button>
    </div>

    <div class="row" id="trekList">
      <!-- Treks will load here -->
    </div>
  </div>
  <div id="footer-placeholder"></div>

  <!-- Modal for Add/Edit -->
  <div class="modal fade" id="trekModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Add New Trek</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="trekForm">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Trek Name</label>
                <input type="text" class="form-control" id="name" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Region</label>
                <select class="form-control" id="region">
                  <option value="">Select</option>
                  <option value="Pune">Pune</option>
                  <option value="Nashik">Nashik</option>
                  <option value="Ahmednagar">Ahmednagar</option>
                </select>
              </div>
            </div>
            <div class="row g-3 mt-3">
              <div class="col-md-3">
                <label class="form-label">Difficulty</label>
                <select class="form-control" id="difficulty">
                  <option value="">Select</option>
                  <option value="Easy">Easy</option>
                  <option value="Moderate">Moderate</option>
                  <option value="Difficult">Difficult</option>
                  <option value="Extreme">Extreme</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">Days</label>
                <input type="number" class="form-control" id="days" min="1" max="7">
              </div>
              <div class="col-md-3">
                <label class="form-label">Price (₹)</label>
                <input type="number" class="form-control" id="price">
              </div>
              <div class="col-md-3">
                <label class="form-label">Max Group</label>
                <input type="number" class="form-control" id="maxGroup" min="5" max="50">
              </div>
            </div>
            <div class="row g-3 mt-3">
              <div class="col-md-6">
                <label class="form-label">Main Image</label>
                <input type="file" class="form-control" id="mainImg" accept="image/*" title="Upload 1200 x 700 px image">
                <div class="form-text">Required: 1200 x 700 px (JPG/PNG, max 5MB). This is used as trek cover image.</div>
                <img id="mainPreview" class="img-preview mt-2" style="display:none;">
              </div>
              <div class="col-md-6">
                <label class="form-label">Thumbnail</label>
                <input type="file" class="form-control" id="thumbImg" accept="image/*" title="Upload 500 x 320 px image">
                <div class="form-text">Required: 500 x 320 px (JPG/PNG, max 5MB). This is used in trek cards.</div>
                <img id="thumbPreview" class="img-preview mt-2" style="display:none;">
              </div>
            </div>
            <div class="row g-3 mt-3">
              <div class="col-12">
                <label class="form-label">Description</label>
                <textarea class="form-control" id="description" rows="4"></textarea>
              </div>
            </div>
            <div class="row g-3 mt-3">
              <div class="col-md-6">
                <label class="form-label">Guide Name</label>
                <input type="text" class="form-control" id="guide">
              </div>
              <div class="col-md-6">
                <label class="form-label">Transport</label>
                <input type="text" class="form-control" id="transport">
              </div>
            </div>
            <div class="row g-3 mt-3">
              <div class="col-md-4">
                <label class="form-label">Altitude</label>
                <input type="text" class="form-control" id="altitude" placeholder="e.g. 1,424 m">
              </div>
              <div class="col-md-4">
                <label class="form-label">Rating</label>
                <input type="number" class="form-control" id="rating" min="1" max="5" step="0.1" placeholder="e.g. 4.8">
              </div>
              <div class="col-md-4">
                <label class="form-label">Tags (comma separated)</label>
                <input type="text" class="form-control" id="tags" placeholder="Fort Trek, Monsoon, Beginner">
              </div>
            </div>
            <div class="row g-3 mt-3">
              <div class="col-md-6">
                <label class="form-label">Itinerary (one line per day: Title | Description)</label>
                <textarea class="form-control" id="itinerary" rows="4" placeholder="Day 1 | Pune to base camp ..."></textarea>
              </div>
              <div class="col-md-6">
                <label class="form-label">Camps (one line per camp: Name | Altitude | Capacity | Facilities)</label>
                <textarea class="form-control" id="camps" rows="4" placeholder="Base Camp | 900 m | 20 | tents, meals"></textarea>
              </div>
            </div>
            <div class="mt-4">
              <h6>Instances</h6>
              <div id="instancesList">
              </div>
              <button type="button" class="btn btn-outline-primary btn-sm" onclick="addInstance()">Add Instance</button>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="saveTrek()">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="shared.js"></script>
  <script>
    renderNav();
    renderFooter();
    loadTreks();

    const trekModal = new bootstrap.Modal(document.getElementById('trekModal'));
    let editingId = null;
    let pendingMainImage = '';
    let pendingThumbImage = '';
    const MAX_UPLOAD_BYTES = 5 * 1024 * 1024;

    function validateImageFile(file, label) {
      if (!file) return false;
      if (!file.type.startsWith('image/')) {
        alert(`${label}: please upload an image file.`);
        return false;
      }
      if (file.size > MAX_UPLOAD_BYTES) {
        alert(`${label}: image size should be 5MB or less.`);
        return false;
      }
      return true;
    }

    function toDisplayDate(isoDate) {
      if (!isoDate) return '';
      const d = new Date(isoDate);
      if (Number.isNaN(d.getTime())) return '';
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }

    function toISOFromDisplay(displayDate) {
      if (!displayDate) return '';
      const d = new Date(`${displayDate} 2026`);
      if (Number.isNaN(d.getTime())) return '';
      return d.toISOString().split('T')[0];
    }

    function parseListField(raw, mapper) {
      return raw
        .split('\n')
        .map((line) => line.trim())
        .filter(Boolean)
        .map(mapper)
        .filter(Boolean);
    }

    function defaultGuide() {
      return { name: '', exp: '0 yrs', spec: 'Local Trek Specialist', cert: 'First Aid Certified' };
    }

    function renderTrekCards() {
      const list = document.getElementById('trekList');
      list.innerHTML = TREKS.map((t) => `
        <div class="col-12">
          <div class="trek-card">
            <div class="d-flex flex-wrap gap-3 align-items-start">
              <img src="${t.thumb}" alt="${t.name}" style="width:90px;height:70px;object-fit:cover;border-radius:8px;">
              <div class="flex-grow-1">
                <h6 class="mb-1">${t.name}</h6>
                <p class="mb-1 text-muted">${t.difficulty} • ${t.region} • ${t.days} days • Max ${t.maxGroup}</p>
                <p class="mb-0 text-success fw-bold">₹${Number(t.price || 0).toLocaleString('en-IN')}</p>
              </div>
              <div class="d-flex gap-2">
                <button class="btn btn-edit btn-sm" onclick="openEditTrek('${t.id}')">Edit</button>
                <button class="btn btn-delete btn-sm" onclick="removeTrek('${t.id}')">Delete</button>
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    function resetForm() {
      document.getElementById('trekForm').reset();
      document.getElementById('instancesList').innerHTML = '';
      document.getElementById('mainPreview').style.display = 'none';
      document.getElementById('thumbPreview').style.display = 'none';
      pendingMainImage = '';
      pendingThumbImage = '';
      addInstance();
    }

    function setImagePreview(elId, src) {
      const img = document.getElementById(elId);
      if (src) {
        img.src = src;
        img.style.display = 'block';
      } else {
        img.style.display = 'none';
      }
    }

    function addInstance(instance = null) {
      const list = document.getElementById('instancesList');
      const row = document.createElement('div');
      row.className = 'instance-item p-3 border rounded mb-2';
      row.innerHTML = `
        <div class="row g-2 align-items-end">
          <div class="col-md-4">
            <label class="form-label">Start Date</label>
            <input type="date" class="form-control inst-start" value="${instance?.start ? toISOFromDisplay(instance.start) : ''}">
          </div>
          <div class="col-md-4">
            <label class="form-label">End Date</label>
            <input type="date" class="form-control inst-end" value="${instance?.end ? toISOFromDisplay(instance.end) : ''}">
          </div>
          <div class="col-md-3">
            <label class="form-label">Slots</label>
            <input type="number" class="form-control inst-slots" min="1" value="${instance?.slots || 10}">
          </div>
          <div class="col-md-1">
            <button type="button" class="btn btn-outline-danger btn-sm w-100" onclick="this.closest('.instance-item').remove()">✕</button>
          </div>
        </div>`;
      list.appendChild(row);
    }

    function openAddTrek() {
      editingId = null;
      document.getElementById('modalTitle').textContent = 'Add New Trek';
      resetForm();
      trekModal.show();
    }

    function openEditTrek(id) {
      const trek = getTrekById(id);
      if (!trek) return;
      editingId = id;
      document.getElementById('modalTitle').textContent = `Edit ${trek.name}`;
      resetForm();
      document.getElementById('name').value = trek.name || '';
      document.getElementById('region').value = trek.region || '';
      document.getElementById('difficulty').value = trek.difficulty || '';
      document.getElementById('days').value = trek.days || 1;
      document.getElementById('price').value = trek.price || 0;
      document.getElementById('maxGroup').value = trek.maxGroup || 10;
      document.getElementById('description').value = trek.desc || '';
      document.getElementById('guide').value = trek.guide?.name || '';
      document.getElementById('transport').value = trek.transport || '';
      document.getElementById('altitude').value = trek.altitude || '';
      document.getElementById('rating').value = trek.rating || 4.5;
      document.getElementById('tags').value = (trek.tags || []).join(', ');
      document.getElementById('itinerary').value = (trek.itinerary || [])
        .map((item) => `${item.title || ''} | ${item.desc || ''}`)
        .join('\n');
      document.getElementById('camps').value = (trek.camps || [])
        .map((camp) => `${camp.name || ''} | ${camp.alt || ''} | ${camp.cap || 0} | ${camp.fac || ''}`)
        .join('\n');

      pendingMainImage = trek.img || '';
      pendingThumbImage = trek.thumb || '';
      setImagePreview('mainPreview', pendingMainImage);
      setImagePreview('thumbPreview', pendingThumbImage);

      const instanceList = document.getElementById('instancesList');
      instanceList.innerHTML = '';
      (trek.instances || []).forEach(addInstance);
      if (!(trek.instances || []).length) addInstance();
      trekModal.show();
    }

    async function processImageInput(fileInputId, currentImage, width, height, quality) {
      const input = document.getElementById(fileInputId);
      if (!input.files || !input.files.length) return currentImage;
      return fileToBase64(input.files[0], width, height, quality);
    }

    async function saveTrek() {
      const name = document.getElementById('name').value.trim();
      const region = document.getElementById('region').value;
      const difficulty = document.getElementById('difficulty').value;
      const days = parseInt(document.getElementById('days').value, 10);
      const price = parseInt(document.getElementById('price').value, 10);
      const maxGroup = parseInt(document.getElementById('maxGroup').value, 10);
      if (!name || !region || !difficulty || !days || !price || !maxGroup) {
        alert('Please fill required fields: name, region, difficulty, days, price, max group.');
        return;
      }

      const instances = Array.from(document.querySelectorAll('.instance-item')).map((item, idx) => {
        const startIso = item.querySelector('.inst-start').value;
        const endIso = item.querySelector('.inst-end').value || startIso;
        const slots = parseInt(item.querySelector('.inst-slots').value, 10) || 0;
        const yearSafeId = Date.now().toString().slice(-4);
        return {
          id: editingId ? `${editingId}-INS${idx + 1}` : `INS${yearSafeId}${idx + 1}`,
          start: toDisplayDate(startIso),
          end: toDisplayDate(endIso || startIso),
          slots
        };
      }).filter((i) => i.start && i.end && i.slots > 0);

      const itinerary = parseListField(document.getElementById('itinerary').value, (line) => {
        const [title, desc] = line.split('|').map((v) => (v || '').trim());
        if (!title) return null;
        return { title, desc: desc || title };
      });

      const camps = parseListField(document.getElementById('camps').value, (line) => {
        const [nameVal, alt, cap, fac] = line.split('|').map((v) => (v || '').trim());
        if (!nameVal) return null;
        return { name: nameVal, alt: alt || '-', cap: parseInt(cap, 10) || maxGroup, fac: fac || 'Standard camping facilities' };
      });

      const mainImage = await processImageInput('mainImg', pendingMainImage, 1200, 700, 0.85);
      const thumbImage = await processImageInput('thumbImg', pendingThumbImage || mainImage, 500, 320, 0.82);
      const tags = document.getElementById('tags').value
        .split(',')
        .map((tag) => tag.trim())
        .filter(Boolean);

      const trekData = {
        name,
        region,
        difficulty,
        days,
        price,
        maxGroup,
        altitude: document.getElementById('altitude').value.trim() || '-',
        rating: Number(document.getElementById('rating').value) || 4.5,
        desc: document.getElementById('description').value.trim() || 'Details will be updated soon.',
        tags: tags.length ? tags : ['Sahyadri'],
        itinerary: itinerary.length ? itinerary : [{ title: 'Trek Day', desc: 'Detailed itinerary will be shared before departure.' }],
        camps: camps.length ? camps : [{ name: 'Base Camp', alt: '-', cap: maxGroup, fac: 'Standard facilities' }],
        guide: {
          ...defaultGuide(),
          name: document.getElementById('guide').value.trim() || 'Assigned Guide'
        },
        transport: document.getElementById('transport').value.trim() || 'Pune',
        instances: instances.length ? instances : [{ id: `INS${Date.now().toString().slice(-4)}`, start: 'Jun 1', end: 'Jun 1', slots: maxGroup }],
        img: mainImage || pendingMainImage || 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1000&q=80',
        thumb: thumbImage || mainImage || pendingThumbImage || 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=500&q=75'
      };

      if (editingId) {
        updateTrek(editingId, trekData);
      } else {
        addTrek(trekData);
      }

      renderTrekCards();
      trekModal.hide();
    }

    function removeTrek(id) {
      const trek = getTrekById(id);
      if (!trek) return;
      if (!confirm(`Delete "${trek.name}"? This updates trek listings immediately.`)) return;
      deleteTrek(id);
      renderTrekCards();
    }

    document.getElementById('mainImg').addEventListener('change', async (e) => {
      if (!e.target.files?.length) return;
      if (!validateImageFile(e.target.files[0], 'Main Image')) {
        e.target.value = '';
        return;
      }
      pendingMainImage = await fileToBase64(e.target.files[0], 1200, 700, 0.85);
      setImagePreview('mainPreview', pendingMainImage);
    });

    document.getElementById('thumbImg').addEventListener('change', async (e) => {
      if (!e.target.files?.length) return;
      if (!validateImageFile(e.target.files[0], 'Thumbnail')) {
        e.target.value = '';
        return;
      }
      pendingThumbImage = await fileToBase64(e.target.files[0], 500, 320, 0.82);
      setImagePreview('thumbPreview', pendingThumbImage);
    });

    renderTrekCards();
  </script>
</body>
</html>
