<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard – Trek&Camp Management</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
:root {
  --brand: #1a6b4a;
  --brand-light: #e8f5ee;
  --brand-dark: #0f4a32;
  --sidebar-width: 260px;
  --radius: 12px;
  --bg: #f8fafc;
  --border: #e2e8f0;
}
* { box-sizing: border-box; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); }

/* MODALS */
.edit-modal .modal-dialog { max-width: 900px; }
.field-group { margin-bottom: 1.2rem; }
.field-group label { font-size: .78rem; color: var(--text-muted); font-weight: 500; display: block; margin-bottom: .35rem; text-transform: uppercase; letter-spacing: .4px; }
.field-group input, .field-group select, .field-group textarea { width: 100%; border: 1px solid var(--border); border-radius: 8px; padding: .65rem .9rem; font-size: .88rem; transition: border-color .15s; }
.field-group input:focus, .field-group select:focus, .field-group textarea:focus { border-color: var(--brand); outline: none; box-shadow: 0 0 0 3px rgba(26,107,74,.08); }
.img-preview { max-width: 200px; max-height: 150px; border-radius: 8px; border: 2px solid var(--border); margin-top: .5rem; }
.array-editor { min-height: 120px; border: 1px solid var(--border); border-radius: 8px; padding: .8rem; background: #fafbfc; }
.array-item { display: flex; gap: .75rem; align-items: flex-start; padding: .6rem 0; border-bottom: 1px solid #e5e7eb; }
.array-item:last-child { border-bottom: none; }
.array-item input[type=text] { flex: 1; }
.array-del { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; font-size: .78rem; padding: .3rem .7rem; border-radius: 6px; cursor: pointer; }
.trek-list-item { display: flex; align-items: center; gap: 1rem; padding: 1rem; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: .75rem; background: #fff; cursor: pointer; transition: all .15s; }
.trek-list-item:hover { border-color: var(--brand); box-shadow: 0 4px 12px rgba(26,107,74,.12); transform: translateY(-1px); }
.trek-thumb { width: 80px; height: 60px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
.trek-info h6 { margin: 0 0 .2rem; font-size: 1rem; }
.trek-meta { font-size: .8rem; color: var(--text-muted); }
.trek-actions { margin-left: auto; display: flex; gap: .4rem; }
.btn-sm { font-size: .78rem; padding: .35rem .75rem; border-radius: 6px; font-weight: 500; }
.btn-edit { background: var(--brand-light); color: var(--brand-dark); border: 1px solid var(--brand); }
.btn-delete { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
.stats-row { display: flex; gap: 2rem; flex-wrap: wrap; margin-bottom: 2rem; }
.stat-box { text-align: center; padding: 1.5rem; background: #fff; border-radius: var(--radius); border: 1px solid var(--border); flex: 1; min-width: 140px; }
.stat-num { font-family: 'DM Serif Display', serif; font-size: 2rem; font-weight: 400; color: var(--brand-dark); }
.stat-label { font-size: .78rem; color: var(--text-muted); margin-top: .3rem; text-transform: uppercase; letter-spacing: .5px; }
.btn-add-trek { background: var(--brand); color: #fff; border: none; border-radius: var(--radius); padding: .85rem 1.5rem; font-size: .92rem; font-weight: 500; cursor: pointer; display: inline-flex; align-items: center; gap: .5rem; }
@media (max-width: 768px) { .stats-row { gap: 1rem; } .stat-box { min-width: auto; flex: 1 1 120px; } }
</style>
</head>
<body>
<div id="nav-placeholder"></div>

<!-- STATS OVERVIEW -->
<div class="container py-4">
  <div class="stats-row">
    <div class="stat-box">
      <div class="stat-num" id="trekCount">0</div>
      <div class="stat-label">Total Treks</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="instanceCount">0</div>
      <div class="stat-label">Instances</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="bookingCount">0</div>
      <div class="stat-label">Bookings</div>
    </div>
    <div class="stat-box">
      <div class="stat-num" id="revenueTotal">₹0</div>
      <div class="stat-label">Revenue</div>
    </div>
  </div>
  
  <div style="display:flex; gap:1.5rem; align-items:center; margin-bottom:2rem;">
    <h1 style="font-family:'DM Serif Display',serif; font-size:1.8rem; margin:0;">Trek Management</h1>
    <button class="btn-add-trek" onclick="showAddTrekModal()">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add New Trek
    </button>
  </div>

  <div class="trek-list" id="trekList">
    <!-- Dynamic trek list -->
  </div>
</div>

<!-- ADD/EDIT TREK MODAL -->
<div class="modal fade" id="trekModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Add New Trek</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="trekForm">
          <div class="row">
            <div class="col-md-6">
              <div class="field-group">
                <label>Name</label>
                <input type="text" id="trekName" required>
              </div>
              <div class="field-group">
                <label>Region</label>
                <select id="trekRegion" required>
                  <option value="">Select Region</option>
                  <option value="Pune">Pune</option>
                  <option value="Nashik">Nashik</option>
                  <option value="Ahmednagar">Ahmednagar</option>
                  <option value="Raigad">Raigad</option>
                  <option value="Thane">Thane</option>
                </select>
              </div>
              <div class="field-group">
                <label>Difficulty</label>
                <select id="trekDifficulty" required>
                  <option value="">Select</option>
                  <option value="Easy">Easy</option>
                  <option value="Moderate">Moderate</option>
                  <option value="Difficult">Difficult</option>
                  <option value="Extreme">Extreme</option>
                </select>
              </div>
              <div class="field-group">
                <label>Days</label>
                <input type="number" id="trekDays" min="1" max="5" required>
              </div>
            </div>
            <div class="col-md-6">
              <div class="field-group">
                <label>Price (₹)</label>
                <input type="number" id="trekPrice" min="500" required>
              </div>
              <div class="field-group">
                <label>Altitude</label>
                <input type="text" id="trekAltitude" placeholder="e.g. 1,424 m">
              </div>
              <div class="field-group">
                <label>Max Group</label>
                <input type="number" id="trekMaxGroup" min="5" max="50" required>
              </div>
              <div class="field-group">
                <label>Rating</label>
                <input type="number" id="trekRating" min="1" max="5" step="0.1" value="4.5">
              </div>
            </div>
          </div>
          
          <div class="row">
            <div class="col-md-6">
              <div class="field-group">
                <label>Main Image</label>
                <input type="file" id="trekImg" accept="image/*">
                <img class="img-preview" id="imgPreview" style="display:none;">
              </div>
            </div>
            <div class="col-md-6">
              <div class="field-group">
                <label>Thumbnail</label>
                <input type="file" id="trekThumb" accept="image/*">
                <img class="img-preview" id="thumbPreview" style="display:none;">
              </div>
            </div>
          </div>

          <div class="field-group">
            <label>Description</label>
            <textarea id="trekDesc" rows="3" placeholder="Detailed description..."></textarea>
          </div>

          <div class="field-group">
            <label>Tags (comma separated)</label>
            <input type="text" id="trekTags" placeholder="Sahyadri, Fort Trek, Overnight">
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="field-group">
                <label>Transport From</label>
                <input type="text" id="trekTransport" placeholder="Pune / Nashik">
              </div>
            </div>
            <div class="col-md-6">
              <div class="field-group">
                <label>Guide Name</label>
                <input type="text" id="guideName">
              </div>
            </div>
          </div>

          <!-- ITINERARY -->
          <div class="field-group">
            <label>Itinerary (Day-by-day)</label>
            <div class="array-editor" id="itineraryEditor"></div>
            <button type="button" class="btn btn-sm mt-2" onclick="addItineraryItem()">+ Add Day</button>
          </div>

          <!-- CAMPS -->
          <div class="field-group">
            <label>Camps</label>
            <div class="array-editor" id="campsEditor"></div>
            <button type="button" class="btn btn-sm mt-2" onclick="addCampItem()">+ Add Camp</button>
          </div>

          <!-- INSTANCES -->
          <div class="field-group">
            <label>Trek Instances (Batches)</label>
            <div class="array-editor" id="instancesEditor"></div>
            <button type="button" class="btn btn-sm mt-2" onclick="addInstanceItem()">+ Add Instance</button>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="saveTrek()">Save Trek</button>
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="shared.js"></script>
<script>
// Load data & init
loadTreks();
updateStats();
renderTrekList();
renderNav();
renderFooter();

// STATS
function updateStats() {
  document.getElementById('trekCount').textContent = TREKS.length;
  const totalInstances = TREKS.reduce((sum, t) => sum + t.instances.length, 0);
  document.getElementById('instanceCount').textContent = totalInstances;
  const bookings = getBookings();
  document.getElementById('bookingCount').textContent = bookings.length;
  const revenue = bookings.reduce((sum, b) => sum + b.amount, 0);
  document.getElementById('revenueTotal').textContent = '₹' + revenue.toLocaleString();
}

// TREK LIST
function renderTrekList() {
  const list = document.getElementById('trekList');
  list.innerHTML = TREKS.map(t => `
    <div class="trek-list-item" onclick="editTrek('${t.id}')">
      <img src="${t.thumb}" alt="${t.name}" class="trek-thumb">
      <div class="trek-info flex-grow-1">
        <h6>${t.name}</h6>
        <div class="trek-meta">${t.difficulty} • ${t.region} • ${t.days} days • ₹${t.price}</div>
      </div>
      <div class="trek-actions">
        <button class="btn-sm btn-edit" onclick="event.stopPropagation(); editTrek('${t.id}')">Edit</button>
        <button class="btn-sm btn-delete" onclick="event.stopPropagation(); deleteTrekConfirm('${t.id}')">Delete</button>
      </div>
    </div>
  `).join('') || '<p style="text-align:center;color:var(--text-muted);padding:2rem;">No treks yet. <button class="btn-add-trek mt-2" onclick="showAddTrekModal()">Add first trek</button></p>';
}

// MODALS & FORMS
let editingTrekId = null;

function showAddTrekModal() {
  editingTrekId = null;
  document.getElementById('modalTitle').textContent = 'Add New Trek';
  document.getElementById('trekForm').reset();
  document.getElementById('itineraryEditor').innerHTML = '';
  document.getElementById('campsEditor').innerHTML = '';
  document.getElementById('instancesEditor').innerHTML = '';
  new bootstrap.Modal(document.getElementById('trekModal')).show();
}

function editTrek(id) {
  editingTrekId = id;
  const trek = getTrekById(id);
  document.getElementById('modalTitle').textContent = 'Edit ' + trek.name;
  
  // Fill form
  document.getElementById('trekName').value = trek.name;
  document.getElementById('trekRegion').value = trek.region;
  document.getElementById('trekDifficulty').value = trek.difficulty;
  document.getElementById('trekDays').value = trek.days;
  document.getElementById('trekPrice').value = trek.price;
  document.getElementById('trekAltitude').value = trek.altitude;
  document.getElementById('trekMaxGroup').value = trek.maxGroup;
  document.getElementById('trekRating').value = trek.rating;
  document.getElementById('trekDesc').value = trek.desc;
  document.getElementById('trekTags').value = trek.tags.join(', ');
  document.getElementById('trekTransport').value = trek.transport;
  document.getElementById('guideName').value = trek.guide.name;
  
  // Arrays
  renderArrayEditor('itineraryEditor', trek.itinerary, 'itinerary');
  renderArrayEditor('campsEditor', trek.camps, 'camps');
  renderArrayEditor('instancesEditor', trek.instances, 'instances');
  
  new bootstrap.Modal(document.getElementById('trekModal')).show();
}

function renderArrayEditor(containerId, items, type) {
  const container = document.getElementById(containerId);
  container.innerHTML = items.map((item, idx) => {
    if (type === 'itinerary') {
      return `
        <div class="array-item">
          <input type="text" value="${item.title}" placeholder="Day title" data-idx="${idx}" data-type="${type}" data-field="title">
          <textarea rows="2" placeholder="Description" data-idx="${idx}" data-type="${type}" data-field="desc">${item.desc}</textarea>
          <button type="button" class="array-del" onclick="removeArrayItem(this)">×</button>
        </div>`;
    } else if (type === 'camps') {
      return `
        <div class="array-item">
          <input type="text" value="${item.name}" placeholder="Camp name" data-idx="${idx}" data-type="${type}" data-field="name">
          <input type="text" value="${item.alt}" placeholder="Altitude" data-idx="${idx}" data-type="${type}" data-field="alt">
          <input type="text" value="${item.cap}" placeholder="Capacity" data-idx="${idx}" data-type="${type}" data-field="cap">
          <input type="text" value="${item.fac}" placeholder="Facilities" data-idx="${idx}" data-type="${type}" data-field="fac">
          <button type="button" class="array-del" onclick="removeArrayItem(this)">×</button>
        </div>`;
    } else if (type === 'instances') {
      return `
        <div class="array-item">
          <input type="text" value="${item.start}" placeholder="Start date" data-idx="${idx}" data-type="${type}" data-field="start">
          <input type="text" value="${item.end}" placeholder="End date" data-idx="${idx}" data-type="${type}" data-field="end">
          <input type="number" value="${item.slots}" placeholder="Slots" data-idx="${idx}" data-type="${type}" data-field="slots">
          <button type="button" class="array-del" onclick="removeArrayItem(this)">×</button>
        </div>`;
    }
  }).join('');
}

function addItineraryItem() { addArrayItem('itineraryEditor', 'itinerary'); }
function addCampItem() { addArrayItem('campsEditor', 'camps'); }
function addInstanceItem() { addArrayItem('instancesEditor', 'instances'); }

function addArrayItem(containerId, type) {
  const container = document.getElementById(containerId);
  const idx = container.querySelectorAll('.array-item').length;
  const html = type === 'itinerary' ? `
    <div class="array-item">
      <input type="text" placeholder="Day title" data-idx="${idx}" data-type="${type}" data-field="title">
      <textarea rows="2" placeholder="Description" data-idx="${idx}" data-type="${type}" data-field="desc"></textarea>
      <button type="button" class="array-del" onclick="removeArrayItem(this)">×</button>
    </div>` :
    `<div class="array-item">
      <input type="text" placeholder="Title" data-idx="${idx}" data-type="${type}" data-field="title">
      <input type="text" placeholder="Value" data-idx="${idx}" data-type="${type}" data-field="desc">
      <button type="button" class="array-del" onclick="removeArrayItem(this)">×</button>
    </div>`;
  container.insertAdjacentHTML('beforeend', html);
}

function removeArrayItem(btn) {
  btn.closest('.array-item').remove();
}

function saveTrek() {
  const formData = {
    name: document.getElementById('trekName').value,
    region: document.getElementById('trekRegion').value,
    difficulty: document.getElementById('trekDifficulty').value,
    days: parseInt(document.getElementById('trekDays').value),
    price: parseInt(document.getElementById('trekPrice').value),
    altitude: document.getElementById('trekAltitude').value,
    maxGroup: parseInt(document.getElementById('trekMaxGroup').value),
    rating: parseFloat(document.getElementById('trekRating').value),
    desc: document.getElementById('trekDesc').value,
    tags: document.getElementById('trekTags').value.split(',').map(t=>t.trim()).filter(Boolean),
    transport: document.getElementById('trekTransport').value,
    guide: { name: document.getElementById('guideName').value }
  };

  // Images (handle async)
  const imgFile = document.getElementById('trekImg').files[0];
  const thumbFile = document.getElementById('trekThumb').files[0];
  
  if (imgFile) formData.img = await fileToBase64(imgFile, 800, 600);
  if (thumbFile) formData.thumb = await fileToBase64(thumbFile, 400, 300);
  
  // Arrays
  formData.itinerary = getArrayData('itineraryEditor');
  formData.camps = getArrayData('campsEditor');
  formData.instances = getArrayData('instancesEditor');
  
  if (editingTrekId) {
    updateTrek(editingTrekId, formData);
  } else {
    addTrek(formData);
  }
  
  updateStats();
  renderTrekList();
  bootstrap.Modal.getInstance(document.getElementById('trekModal')).hide();
  alert('Trek saved! Changes reflect immediately on all pages.');
}

function getArrayData(containerId) {
  const container = document.getElementById(containerId);
  const items = [];
  container.querySelectorAll('.array-item').forEach(item => {
    const type = item.querySelector('[data-type]').dataset.type;
    const data = {};
    item.querySelectorAll('[data-field]').forEach(field => {
      data[field.dataset.field] = field.value;
    });
    items.push(data);
  });
  return items;
}

function deleteTrekConfirm(id) {
  if (confirm('Delete this trek? It will be removed from all listings.')) {
    deleteTrek(id);
    updateStats();
    renderTrekList();
  }
}

// Image preview
document.getElementById('trekImg').addEventListener('change', async e => {
  if (e.target.files[0]) {
    const base64 = await fileToBase64(e.target.files[0], 200, 150);
    document.getElementById('imgPreview').src = base64;
    document.getElementById('imgPreview').style.display = 'block';
  }
});
document.getElementById('trekThumb').addEventListener('change', async e => {
  if (e.target.files[0]) {
    const base64 = await fileToBase64(e.target.files[0], 200, 150);
    document.getElementById('thumbPreview').src = base64;
    document.getElementById('thumbPreview').style.display = 'block';
  }
});
</script>
</body>
</html>
