<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Treks Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    :root { --brand: #1a6b4a; --bg: #f9fafb; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); }
    .admin-header { background: white; padding: 1.5rem 0; border-bottom: 1px solid #e5e7eb; }
    .trek-card { border: 1px solid #e5e7eb; border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; background: white; cursor: pointer; transition: box-shadow 0.2s; }
    .trek-card:hover { box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
    .btn-add { background: var(--brand); color: white; border: none; border-radius: 8px; padding: 0.75rem 1.5rem; font-weight: 500; }
    .btn-edit { background: #dbeafe; color: #1e40af; border: 1px solid #93c5fd; }
    .btn-delete { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }
    .modal-xl .modal-dialog { max-width: 1000px; }
    .form-label { font-weight: 500; font-size: 0.85rem; color: #374151; margin-bottom: 0.5rem; display: block; }
    .form-control { border-radius: 8px; border: 1px solid #d1d5db; padding: 0.75rem; }
    .form-control:focus { border-color: var(--brand); box-shadow: 0 0 0 3px rgba(26,107,74,0.1); }
    .img-preview { max-width: 250px; max-height: 200px; border-radius: 8px; border: 2px solid #e5e7eb; margin-top: 0.5rem; }
    .array-section { background: #f9fafb; border-radius: 8px; padding: 1rem; margin-top: 1rem; }
    .array-item { display: flex; gap: 0.75rem; align-items: start; padding: 0.75rem 0; border-bottom: 1px solid #e5e7eb; }
    .array-item:last-child { border-bottom: none; }
    .remove-item { background: #fee2e2; color: #dc2626; border: none; border-radius: 6px; padding: 0.25rem 0.5rem; font-size: 0.8rem; cursor: pointer; }
  </style>
</head>
<body>
  <div id="nav-placeholder"></div>

  <div class="container mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h1 style="font-size: 2rem; font-weight: 600; margin: 0;">Trek Management</h1>
      <button class="btn btn-add" onclick="openAddTrek()">
        <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
        Add Trek
      </button>
    </div>

    <div class="row" id="trekList">
      <!-- Treks will load here -->
    </div>
  </div>

  <!-- Modal for Add/Edit -->
  <div class="modal fade" id="trekModal" tabindex="-1">
    <div class="modal-dialog modal-xl">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Add New Trek</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="trekForm">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Trek Name</label>
                <input type="text" class="form-control" id="name" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Region</label>
                <select class="form-control" id="region">
                  <option value="">Select</option>
                  <option value="Pune">Pune</option>
                  <option value="Nashik">Nashik</option>
                  <option value="Ahmednagar">Ahmednagar</option>
                </select>
              </div>
            </div>
            <div class="row g-3 mt-3">
              <div class="col-md-3">
                <label class="form-label">Difficulty</label>
                <select class="form-control" id="difficulty">
                  <option value="">Select</option>
                  <option value="Easy">Easy</option>
                  <option value="Moderate">Moderate</option>
                  <option value="Difficult">Difficult</option>
                  <option value="Extreme">Extreme</option>
                </select>
              </div>
              <div class="col-md-3">
                <label class="form-label">Days</label>
                <input type="number" class="form-control" id="days" min="1" max="7">
              </div>
              <div class="col-md-3">
                <label class="form-label">Price (₹)</label>
                <input type="number" class="form-control" id="price">
              </div>
              <div class="col-md-3">
                <label class="form-label">Max Group</label>
                <input type="number" class="form-control" id="maxGroup" min="5" max="50">
              </div>
            </div>
            <div class="row g-3 mt-3">
              <div class="col-md-6">
                <label class="form-label">Main Image</label>
                <input type="file" class="form-control" id="mainImg" accept="image/*">
                <img id="mainPreview" class="img-preview mt-2" style="display:none;">
              </div>
              <div class="col-md-6">
                <label class="form-label">Thumbnail</label>
                <input type="file" class="form-control" id="thumbImg" accept="image/*">
                <img id="thumbPreview" class="img-preview mt-2" style="display:none;">
              </div>
            </div>
            <div class="row g-3 mt-3">
              <div class="col-12">
                <label class="form-label">Description</label>
                <textarea class="form-control" id="description" rows="4"></textarea>
              </div>
            </div>
            <div class="row g-3 mt-3">
              <div class="col-md-6">
                <label class="form-label">Guide Name</label>
                <input type="text" class="form-control" id="guide">
              </div>
              <div class="col-md-6">
                <label class="form-label">Transport</label>
                <input type="text" class="form-control" id="transport">
              </div>
            </div>
            <div class="mt-4">
              <h6>Instances</h6>
              <div id="instancesList">
                <div class="instance-item p-3 border rounded mb-2">
                  <div class="row">
                    <div class="col">
                      <label>Start Date</label>
                      <input type="date" class="form-control">
                    </div>
                    <div class="col">
                      <label>End Date</label>
                      <input type="date" class="form-control">
                    </div>
                    <div class="col">
                      <label>Slots</label>
                      <input type="number" class="form-control" min="1">
                    </div>
                    <div class="col-auto align-self-end">
                      <button type="button" class="btn btn-outline-danger btn-sm">Remove</button>
                    </div>
                  </div>
                </div>
              </div>
              <button type="button" class="btn btn-outline-primary btn-sm" onclick="addInstance()">Add Instance</button>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" onclick="saveTrek()">Save Changes</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="shared.js"></script>
  <script>
    // Load and display
    loadTreks();
    
    function loadTreksDisplay() {
      const list = document.getElementById('trekList');
      list.innerHTML = TREKS.map(t => `
        <div class="trek-card">
          <div class="d-flex">
            <img src="${t.thumb}" style="width:80px;height:60px;object-fit:cover;border-radius:8px;">
            <div class="flex-grow-1 ms-3">
              <h6>${t.name}</h6>
              <p class="mb-1">${t.difficulty} • ${t.region} • ${t.days} days</p>
              <p class="mb-0 text-success fw-bold">₹${t.price}</p>
            </div>
            <div>
              <button class="btn btn-edit btn-sm me-1" onclick="editTrek('${t.id}')">Edit</button>
              <button class="btn btn-delete btn-sm" onclick="deleteTrek('${t.id}')">Delete</button>
            </div>
          </div>
        </div>
      `).join('');
    }
    
    loadTreksDisplay();
    renderNav();
  </script>
</body>
</html>
