<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Booking Detail – Trek&Camp</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.booking-hero{background:var(--brand-dark);border-radius:var(--radius);overflow:hidden;margin-bottom:1.5rem;display:flex;min-height:155px;}
.bh-img{width:210px;flex-shrink:0;object-fit:cover;}
.bh-body{padding:1.4rem;flex:1;display:flex;flex-direction:column;justify-content:center;}
.bh-tag{font-size:.68rem;text-transform:uppercase;letter-spacing:1.2px;color:rgba(255,255,255,.45);margin-bottom:.35rem;}
.bh-title{font-family:'DM Serif Display',serif;font-size:1.45rem;color:#fff;margin-bottom:.4rem;}
.bh-meta{display:flex;gap:1.2rem;flex-wrap:wrap;}
.bh-meta span{font-size:.8rem;color:rgba(255,255,255,.72);}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.9rem;}
.ig-item .lbl{font-size:.7rem;color:var(--text-muted);margin-bottom:.18rem;}
.ig-item .val{font-size:.88rem;font-weight:500;}
.tl{position:relative;padding-left:1.5rem;}
.tl::before{content:'';position:absolute;left:6px;top:6px;bottom:0;width:1px;background:var(--border);}
.tl-item{position:relative;margin-bottom:1rem;}
.tl-dot{position:absolute;left:-1.5rem;top:4px;width:13px;height:13px;border-radius:50%;border:2px solid var(--brand);background:#fff;z-index:1;}
.tl-dot.filled{background:var(--brand);}
.tl-title{font-size:.84rem;font-weight:500;margin-bottom:.12rem;}
.tl-sub{font-size:.75rem;color:var(--text-muted);}
.fee-row{display:flex;justify-content:space-between;font-size:.84rem;padding:.4rem 0;border-bottom:1px solid #f3f4f2;}
.fee-row:last-child{border-bottom:none;}
.fee-row span:first-child{color:var(--text-muted);}
.fee-total{display:flex;justify-content:space-between;font-weight:500;font-size:.9rem;border-top:1px solid var(--border);padding-top:.55rem;margin-top:.2rem;}
.star-btn{background:none;border:none;cursor:pointer;font-size:1.55rem;color:#d1d5db;transition:color .15s;padding:0;}
.star-btn.active,.star-btn:hover{color:#f59e0b;}
@media(max-width:640px){.booking-hero{flex-direction:column;}.bh-img{width:100%;height:150px;}.info-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="bc-bar"><div class="container"><ol class="breadcrumb">
  <li class="breadcrumb-item"><a href="index.html">Home</a></li>
  <li class="breadcrumb-item"><a href="my_bookings.html">My Bookings</a></li>
  <li class="breadcrumb-item active" id="bc-id">Booking</li>
</ol></div></div>
<div style="padding:2rem 0 4rem;">
  <div class="container" id="main-content"></div>
</div>
<div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="shared.js"></script>
<script>
renderNav(); renderFooter();
(async function(){
await window.tcReady;
const bookingId = new URLSearchParams(location.search).get('id');
const bookings = getBookings();
const b = bookings.find(x=>x.id===bookingId) || bookings[0];

if(!b){ document.getElementById('main-content').innerHTML='<p class="text-center py-5">Booking not found. <a href="my_bookings.html">Back to bookings</a></p>'; }
else {
  document.title = b.id+' – Trek&Camp';
  document.getElementById('bc-id').textContent = b.id;
  const trek = getTrekById(b.trekId);
  const base = Math.round(b.total/1.05);
  const gst = b.total - base;

  document.getElementById('main-content').innerHTML = `
    <div class="booking-hero">
      <img src="${b.img}" alt="${b.trekName}" class="bh-img">
      <div class="bh-body">
        <div class="bh-tag">Booking ID: ${b.id}</div>
        <div class="bh-title">${b.trekName}</div>
        <div class="bh-meta">
          <span>📅 ${b.batchText}</span>
          <span>📍 ${b.region}</span>
          <span>👥 ${b.numParticipants} Participant${b.numParticipants>1?'s':''}</span>
          <span class="ms-1"><span class="badge-status st-${b.status.toLowerCase()}">${b.status}</span></span>
        </div>
      </div>
    </div>
    <div class="row g-4">
      <div class="col-lg-8">
        <div class="card-clean">
          <h2 class="card-sec-title">Booking Overview</h2>
          <div class="info-grid">
            <div class="ig-item"><div class="lbl">Booked On</div><div class="val">${b.bookedOn}</div></div>
            <div class="ig-item"><div class="lbl">Difficulty</div><div class="val">${b.difficulty}</div></div>
            <div class="ig-item"><div class="lbl">Duration</div><div class="val">${b.days} Day${b.days>1?'s':''}</div></div>
            <div class="ig-item"><div class="lbl">Transport From</div><div class="val">${b.transport}</div></div>
            <div class="ig-item"><div class="lbl">Guide</div><div class="val">${b.guide||'—'}</div></div>
            <div class="ig-item"><div class="lbl">Special Requests</div><div class="val">${b.specialReq||'None'}</div></div>
          </div>
        </div>
        <div class="card-clean">
          <h2 class="card-sec-title">Trek Status</h2>
          <div class="tl">
            <div class="tl-item"><div class="tl-dot filled"></div><div class="tl-title">Booking Confirmed</div><div class="tl-sub">${b.bookedOn} · Payment received</div></div>
            <div class="tl-item"><div class="tl-dot filled"></div><div class="tl-title">Preparation Pack Sent</div><div class="tl-sub">Packing list & itinerary emailed to you</div></div>
            <div class="tl-item"><div class="tl-dot filled"></div><div class="tl-title">Guide Assigned</div><div class="tl-sub">${b.guide||'Guide'} · Guide contact shared via email</div></div>
            <div class="tl-item"><div class="tl-dot"></div><div class="tl-title" style="color:var(--text-muted)">Departure Day</div><div class="tl-sub">${b.batchText} · Meet at ${b.transport} pickup point</div></div>
            ${b.days>1?`<div class="tl-item"><div class="tl-dot"></div><div class="tl-title" style="color:var(--text-muted)">Trek Completion</div><div class="tl-sub">Drop-off at ${b.transport}</div></div>`:''}
          </div>
        </div>
        ${b.status==='Completed'?`
        <div class="card-clean" id="feedbackSection">
          <h2 class="card-sec-title">Leave Feedback</h2>
          <div class="mb-3">
            <label class="form-lbl">Overall Rating</label>
            <div style="display:flex;gap:.3rem;margin-bottom:.75rem;">
              ${[1,2,3,4,5].map(i=>`<button type="button" class="star-btn active" onclick="setRating(${i},this.parentElement)">${'★'}</button>`).join('')}
            </div>
          </div>
          <div class="mb-3"><label class="form-lbl">Your Comments</label><textarea class="form-ctrl" placeholder="Share your experience…"></textarea></div>
          <button class="btn-brand" onclick="alert('Feedback submitted! Thank you.')">Submit Feedback</button>
        </div>`:''}
      </div>
      <div class="col-lg-4">
        <div class="card-clean">
          <h2 class="card-sec-title">Payment Summary</h2>
          <div class="fee-row"><span>Base price × ${b.numParticipants}</span><span>₹${base.toLocaleString('en-IN')}</span></div>
          <div class="fee-row"><span>Transport & camps</span><span>Included</span></div>
          <div class="fee-row"><span>GST (5%)</span><span>₹${gst.toLocaleString('en-IN')}</span></div>
          <div class="fee-total"><span>Total Paid</span><span style="color:var(--brand-dark);">₹${b.total.toLocaleString('en-IN')}</span></div>
          <div style="margin-top:.8rem;padding:.65rem .85rem;background:#f0fdf4;border-radius:8px;">
            <div style="font-size:.72rem;color:var(--text-muted);margin-bottom:.12rem;">Payment Status</div>
            <div style="font-size:.86rem;font-weight:500;color:#166534;">✓ Paid in Full</div>
          </div>
        </div>
        <div class="card-clean">
          <h2 class="card-sec-title">Quick Actions</h2>
          <div class="d-flex flex-column gap-2">
            <a href="trek_detail.html?id=${b.trekId}" class="btn-outline" style="justify-content:center;">View Trek Details</a>
            ${b.status==='Confirmed'?`<button class="btn-danger-sm" style="border-radius:8px;padding:.5rem;" onclick="cancelBooking('${b.id}')">Cancel Booking</button>`:''}
            ${b.status==='Cancelled'?`<a href="trek_detail.html?id=${b.trekId}" class="btn-brand" style="justify-content:center;">Book Again</a>`:''}
          </div>
          <p style="font-size:.7rem;color:var(--text-muted);margin-top:.7rem;line-height:1.5;">Free cancellation up to 7 days before departure. 50% fee after.</p>
        </div>
      </div>
    </div>`;
}

function setRating(n, container){
  container.querySelectorAll('.star-btn').forEach((b,i)=>{
    b.classList.toggle('active',i<n);
    b.style.color=i<n?'#f59e0b':'#d1d5db';
  });
}

function cancelBooking(id){
  if(!confirm('Cancel this booking? This cannot be undone.')) return;
  cancelBookingById(id)
    .then(() => { location.href='my_bookings.html'; })
    .catch((err) => { alert(err.message || 'Unable to cancel booking'); });
}
})();
</script>
</body>
</html>
