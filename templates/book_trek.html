<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book Trek</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-C8jQGZ9Rg7uWe6EmxRqnCqSApGxN4P0qPbrIk1H7vHWv+G1AVnWp0B9WFGx0eN9I" crossorigin="anonymous" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold text-success" href="/">GreenTrail</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-center gap-2">
          <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/treks">Available Treks</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card border-0 shadow-sm rounded-4 p-4 bg-white">
          <h1 class="fw-bold text-success">Book Trek</h1>
          <p class="text-muted mb-4">Complete your booking request for instance <strong>{{ instance_id }}</strong>.</p>
          <form method="post">
            <div class="row g-3">
              <div class="col-md-6">
                <label for="name" class="form-label">Name</label>
                <input id="name" name="name" type="text" class="form-control" required />
              </div>
              <div class="col-md-6">
                <label for="age" class="form-label">Age</label>
                <input id="age" name="age" type="number" class="form-control" required />
              </div>
              <div class="col-md-6">
                <label for="gender" class="form-label">Gender</label>
                <select id="gender" name="gender" class="form-select" required>
                  <option value="Male">Male</option>
                  <option value="Female">Female</option>
                  <option value="Other">Other</option>
                </select>
              </div>
              <div class="col-md-6">
                <label for="participants" class="form-label">Participants</label>
                <input id="participants" name="participants" type="number" class="form-control" min="1" value="1" required />
              </div>
              <div class="col-md-6">
                <label for="contact" class="form-label">Contact</label>
                <input id="contact" name="contact" type="text" class="form-control" required />
              </div>
              <div class="col-md-6">
                <label for="email" class="form-label">Email</label>
                <input id="email" name="email" type="email" class="form-control" required />
              </div>
              <div class="col-12">
                <label for="requirements" class="form-label">Special Requirements</label>
                <textarea id="requirements" name="requirements" rows="4" class="form-control"></textarea>
              </div>
            </div>
            <button type="submit" class="btn btn-success btn-lg mt-4">Submit Booking Request</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-white py-4 shadow-sm">
    <div class="container text-center text-muted">&copy; 2026 GreenTrail</div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-qXaMeVt1LIZXnG/kZPw4bFn1ox78WolMIpTjN/2rXjzPJGw2EAWac2cPIu2sHfX7" crossorigin="anonymous"></script>
</body>
</html>
