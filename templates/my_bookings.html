<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>My Bookings – Trek&Camp Maharashtra</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.page-header{background:#fff;border-bottom:1px solid var(--border);padding:1.7rem 0;}
.page-header h1{font-family:'DM Serif Display',serif;font-size:1.75rem;letter-spacing:-.3px;margin-bottom:.2rem;}
.page-header p{font-size:.87rem;color:var(--text-muted);}
.filter-pills{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.9rem;}
.fp{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:.33rem .85rem;font-size:.8rem;color:var(--text-muted);cursor:pointer;transition:all .15s;font-family:'DM Sans',sans-serif;}
.fp.active{background:var(--brand-light);border-color:var(--brand);color:var(--brand-dark);font-weight:500;}
.fp .cnt{font-weight:600;margin-left:.25rem;}
.bk-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:.9rem;display:flex;transition:box-shadow .2s;cursor:pointer;}
.bk-card:hover{box-shadow:var(--shadow-md);}
.bk-img{width:165px;flex-shrink:0;object-fit:cover;}
.bk-body{padding:1.15rem;flex:1;display:flex;flex-direction:column;}
.bk-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:.5rem;gap:.5rem;}
.bk-title{font-family:'DM Serif Display',serif;font-size:1.05rem;letter-spacing:-.2px;}
.bk-id{font-size:.7rem;color:var(--text-muted);margin-top:.12rem;}
.bk-meta{display:flex;gap:1rem;flex-wrap:wrap;font-size:.78rem;color:var(--text-muted);margin-bottom:.8rem;}
.bk-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto;padding-top:.75rem;border-top:1px solid var(--border);}
.bk-price{font-family:'DM Serif Display',serif;font-size:1rem;color:var(--brand-dark);}
.bk-price span{font-family:'DM Sans',sans-serif;font-size:.68rem;color:var(--text-muted);display:block;}
.bk-actions{display:flex;gap:.45rem;}
.btn-view{background:var(--brand);color:#fff;border:none;border-radius:7px;padding:.38rem .85rem;font-family:'DM Sans',sans-serif;font-size:.77rem;font-weight:500;cursor:pointer;text-decoration:none;transition:background .15s;}
.btn-view:hover{background:var(--brand-dark);color:#fff;}
.btn-outline-sm{background:#fff;color:var(--text-main);border:1px solid var(--border);border-radius:7px;padding:.38rem .85rem;font-family:'DM Sans',sans-serif;font-size:.77rem;cursor:pointer;text-decoration:none;transition:background .15s;}
.btn-outline-sm:hover{background:var(--bg);}
.profile-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:1.4rem;margin-bottom:1.1rem;}
.p-avatar{width:56px;height:56px;border-radius:50%;background:var(--brand-light);color:var(--brand-dark);font-family:'DM Serif Display',serif;font-size:1.35rem;display:flex;align-items:center;justify-content:center;margin-bottom:.85rem;}
.p-name{font-family:'DM Serif Display',serif;font-size:1.05rem;margin-bottom:.15rem;}
.p-email{font-size:.8rem;color:var(--text-muted);}
.p-stats{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin-top:.9rem;}
.ps{background:var(--bg);border-radius:8px;padding:.55rem .7rem;text-align:center;}
.ps-v{font-family:'DM Serif Display',serif;font-size:1.15rem;}
.ps-l{font-size:.67rem;color:var(--text-muted);}
.ql{display:flex;align-items:center;gap:.55rem;padding:.45rem 0;font-size:.83rem;color:var(--text-main);text-decoration:none;border-bottom:1px solid var(--border);transition:color .15s;}
.ql:last-child{border-bottom:none;}
.ql:hover{color:var(--brand);}
.empty-state{text-align:center;padding:3.5rem 1rem;display:none;}
.empty-icon{width:60px;height:60px;border-radius:50%;background:var(--brand-light);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;}
.empty-state h4{font-family:'DM Serif Display',serif;font-size:1.2rem;margin-bottom:.4rem;}
.empty-state p{font-size:.84rem;color:var(--text-muted);margin-bottom:1rem;}
@media(max-width:580px){.bk-card{flex-direction:column;}.bk-img{width:100%;height:145px;}}
</style>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="page-header">
  <div class="container">
    <h1>My Bookings</h1>
    <p>Track your upcoming, completed and cancelled treks.</p>
    <div class="filter-pills">
      <button class="fp active" data-filter="all">All <span class="cnt" id="cnt-all">0</span></button>
      <button class="fp" data-filter="Confirmed">Upcoming <span class="cnt" id="cnt-confirmed">0</span></button>
      <button class="fp" data-filter="Completed">Completed <span class="cnt" id="cnt-completed">0</span></button>
      <button class="fp" data-filter="Cancelled">Cancelled <span class="cnt" id="cnt-cancelled">0</span></button>
    </div>
  </div>
</div>
<div style="padding:2rem 0 4rem;">
  <div class="container">
    <div class="row g-4">
      <div class="col-lg-8">
        <div id="bookingsList"></div>
        <div class="empty-state" id="emptyState">
          <div class="empty-icon"><svg width="24" height="24" fill="none" stroke="var(--brand)" stroke-width="2" viewBox="0 0 24 24"><path d="M3 17l6-6 4 4 8-8"/></svg></div>
          <h4>No bookings here</h4>
          <p>You haven't made any treks in this category yet.</p>
          <a href="treks.html" class="btn-brand">Browse Treks</a>
        </div>
      </div>
      <div class="col-lg-4">
        <div class="profile-card">
          <div class="p-avatar">PD</div>
          <div class="p-name">Priya Deshmukh</div>
          <div class="p-email">priya@example.com</div>
          <div class="p-stats" id="profileStats">
            <div class="ps"><div class="ps-v" id="statTotal">0</div><div class="ps-l">Bookings</div></div>
            <div class="ps"><div class="ps-v" id="statDone">0</div><div class="ps-l">Treks Done</div></div>
            <div class="ps"><div class="ps-v" id="statSpent">₹0</div><div class="ps-l">Total Spent</div></div>
            <div class="ps"><div class="ps-v">4.9★</div><div class="ps-l">Avg. Given</div></div>
          </div>
        </div>
        <div class="profile-card">
          <h6 style="font-size:.7rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--text-muted);margin-bottom:.7rem;">Quick Links</h6>
          <a href="treks.html" class="ql"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 17l6-6 4 4 8-8"/></svg>Browse Treks</a>
          <a href="treks.html" class="ql"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Search Availability</a>
          <a href="login.html" class="ql"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Logout</a>
        </div>
      </div>
    </div>
  </div>
</div>
<div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="shared.js"></script>
<script>
renderNav(); renderFooter();

let allBookings = getBookings();

// Add demo bookings if empty
if(allBookings.length===0){
  allBookings = [
    {id:'BKG00101',trekId:'T001',trekName:'Harishchandragad',region:'Ahmednagar',batchText:'Jun 14 – Jun 15, 2026',numParticipants:2,total:4620,status:'Confirmed',bookedOn:'10 Apr 2026',img:TREKS[0].thumb,difficulty:'Moderate',days:2,guide:'Rajesh Kumbhar',transport:'Pune',specialReq:'Vegetarian meals'},
    {id:'BKG00504',trekId:'T005',trekName:'Torna Fort Trek',region:'Pune',batchText:'Mar 10, 2026',numParticipants:1,total:1155,status:'Completed',bookedOn:'15 Feb 2026',img:TREKS[4].thumb,difficulty:'Moderate',days:1,guide:'Vijay Shinde',transport:'Pune',specialReq:''},
    {id:'BKG00803',trekId:'T008',trekName:'Sinhagad Fort Trek',region:'Pune',batchText:'Jan 20, 2026',numParticipants:3,total:2520,status:'Cancelled',bookedOn:'5 Jan 2026',img:TREKS[7].thumb,difficulty:'Easy',days:1,guide:'Ramesh Gore',transport:'Pune',specialReq:''}
  ];
  saveBookings(allBookings);
}

let activeFilter = 'all';

function renderBookings(){
  const list = document.getElementById('bookingsList');
  const filtered = activeFilter==='all'?allBookings:allBookings.filter(b=>b.status===activeFilter);
  
  // Update counts
  document.getElementById('cnt-all').textContent=allBookings.length;
  document.getElementById('cnt-confirmed').textContent=allBookings.filter(b=>b.status==='Confirmed').length;
  document.getElementById('cnt-completed').textContent=allBookings.filter(b=>b.status==='Completed').length;
  document.getElementById('cnt-cancelled').textContent=allBookings.filter(b=>b.status==='Cancelled').length;
  
  // Update stats
  document.getElementById('statTotal').textContent=allBookings.length;
  document.getElementById('statDone').textContent=allBookings.filter(b=>b.status==='Completed').length;
  document.getElementById('statSpent').textContent='₹'+allBookings.reduce((s,b)=>s+b.total,0).toLocaleString('en-IN');

  document.getElementById('emptyState').style.display = filtered.length===0?'block':'none';
  list.innerHTML = filtered.map(b=>`
    <div class="bk-card" data-id="${b.id}" onclick="location.href='booking_detail.html?id=${b.id}'">
      <img src="${b.img}" alt="${b.trekName}" class="bk-img" style="${b.status==='Completed'?'filter:grayscale(30%)':b.status==='Cancelled'?'filter:grayscale(65%);opacity:.8':''}">
      <div class="bk-body">
        <div class="bk-top">
          <div><div class="bk-title">${b.trekName}</div><div class="bk-id">${b.id} · Booked ${b.bookedOn}</div></div>
          <span class="badge-status st-${b.status.toLowerCase()}">${b.status}</span>
        </div>
        <div class="bk-meta">
          <span>📅 ${b.batchText}</span>
          <span>📍 ${b.region}, MH</span>
          <span>👥 ${b.numParticipants} Participant${b.numParticipants>1?'s':''}</span>
          <span>⏱ ${b.days} Day${b.days>1?'s':''}</span>
        </div>
        <div class="bk-footer">
          <div class="bk-price"><span>${b.status==='Cancelled'?'Refunded':'Total Paid'}</span>₹${b.total.toLocaleString('en-IN')}</div>
          <div class="bk-actions" onclick="event.stopPropagation()">
            ${b.status==='Cancelled'?`<a href="trek_detail.html?id=${b.trekId}" class="btn-view">Book Again</a>`:''}
            <a href="booking_detail.html?id=${b.id}" class="btn-view">View Details</a>
          </div>
        </div>
      </div>
    </div>`).join('');
}

document.querySelectorAll('.fp').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.fp').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter=btn.dataset.filter;
  renderBookings();
}));

renderBookings();
</script>
</body>
</html>
