<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Trek Detail – Trek&Camp</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
.trek-hero{position:relative;height:440px;overflow:hidden;background:var(--brand-dark);}
.trek-hero img{width:100%;height:100%;object-fit:cover;opacity:.55;}
.trek-hero-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:flex-end;padding:2.5rem;background:linear-gradient(to top,rgba(10,5,5,.78) 0%,transparent 60%);}
.hero-diff-tag{display:inline-block;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px;padding:.28rem .75rem;border-radius:20px;background:rgba(255,255,255,.17);color:#fff;border:1px solid rgba(255,255,255,.32);backdrop-filter:blur(4px);margin-bottom:.7rem;width:fit-content;}
.hero-title{font-family:'DM Serif Display',serif;font-size:2.6rem;color:#fff;margin:0 0 .5rem;letter-spacing:-.5px;line-height:1.1;}
.hero-meta{display:flex;gap:1.4rem;flex-wrap:wrap;}
.hero-meta span{color:rgba(255,255,255,.82);font-size:.84rem;display:flex;align-items:center;gap:.35rem;}
.stat-pills{display:flex;flex-wrap:wrap;gap:.7rem;margin-bottom:2rem;}
.stat-pill{background:#fff;border:1px solid var(--border);border-radius:10px;padding:.55rem 1rem;display:flex;align-items:center;gap:.5rem;}
.pill-icon{width:30px;height:30px;border-radius:7px;background:var(--brand-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.pill-label{font-size:.68rem;color:var(--text-muted);}
.pill-val{font-size:.9rem;font-weight:500;}
.itinerary-item{display:flex;gap:1rem;padding:.9rem 0;border-bottom:1px solid var(--border);}
.itinerary-item:last-child{border-bottom:none;}
.day-badge{min-width:46px;height:46px;border-radius:9px;background:var(--brand-light);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.day-badge .dn{font-size:1.05rem;font-weight:500;color:var(--brand-dark);line-height:1;}
.day-badge .dl{font-size:.58rem;color:var(--brand);text-transform:uppercase;letter-spacing:.5px;}
.itinerary-info h6{margin:0 0 .2rem;font-size:.88rem;font-weight:500;}
.itinerary-info p{margin:0;font-size:.8rem;color:var(--text-muted);line-height:1.55;}
.camp-row{background:#fff;border:1px solid var(--border);border-radius:9px;padding:.9rem;margin-bottom:.7rem;display:flex;align-items:flex-start;gap:.8rem;}
.camp-icon{width:34px;height:34px;border-radius:7px;background:var(--brand-light);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.camp-row h6{margin:0 0 .18rem;font-size:.87rem;font-weight:500;}
.camp-row p{margin:0;font-size:.77rem;color:var(--text-muted);}
.booking-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;position:sticky;top:75px;}
.booking-header{background:var(--brand);padding:1.15rem 1.4rem;color:#fff;}
.price-big{font-family:'DM Serif Display',serif;font-size:2rem;line-height:1;}
.price-note{font-size:.78rem;opacity:.8;margin-top:.2rem;}
.booking-body{padding:1.2rem 1.4rem;}
.bf label{font-size:.75rem;color:var(--text-muted);display:block;margin-bottom:.3rem;font-weight:500;}
.bf select,.bf input{width:100%;border:1px solid var(--border);border-radius:8px;padding:.52rem .82rem;font-size:.86rem;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .15s;background:#fff;}
.bf select:focus,.bf input:focus{border-color:var(--brand);}
.fee-row{display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:.38rem;}
.fee-row span:first-child{color:var(--text-muted);}
.fee-total{font-weight:500;font-size:.9rem;border-top:1px solid var(--border);padding-top:.55rem;margin-top:.2rem;display:flex;justify-content:space-between;}
.btn-book-now{display:block;width:100%;background:var(--brand);color:#fff;border:none;border-radius:10px;padding:.75rem;font-family:'DM Sans',sans-serif;font-size:.93rem;font-weight:500;cursor:pointer;transition:background .15s;margin-top:.9rem;text-decoration:none;text-align:center;}
.btn-book-now:hover{background:var(--brand-dark);color:#fff;}
.guarantee{display:flex;align-items:flex-start;gap:.45rem;background:var(--brand-light);border-radius:7px;padding:.6rem .8rem;margin-top:.75rem;}
.guarantee p{font-size:.72rem;color:var(--brand-dark);line-height:1.5;margin:0;}
.avail-bar{background:var(--border);border-radius:20px;height:5px;margin-top:.35rem;overflow:hidden;}
.avail-fill{background:var(--brand);height:100%;border-radius:20px;}
.tag{display:inline-block;background:var(--brand-light);color:var(--brand-dark);font-size:.75rem;padding:.25rem .65rem;border-radius:20px;margin:.2rem;}
.cert-badge{display:inline-block;background:#edf7f2;color:#0f4a32;font-size:.7rem;padding:.18rem .52rem;border-radius:20px;margin-top:.3rem;border:1px solid #c0dfd0;margin-right:.3rem;}
.guide-block{display:flex;align-items:center;gap:1rem;}
.guide-avatar{width:50px;height:50px;border-radius:50%;background:var(--brand-light);color:var(--brand-dark);font-family:'DM Serif Display',serif;font-size:1.1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rev-card{background:#fff;border:1px solid var(--border);border-radius:9px;padding:1rem 1.1rem;margin-bottom:.8rem;}
.rev-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:.4rem;}
.rev-name{font-size:.88rem;font-weight:500;}
.rev-date{font-size:.75rem;color:var(--text-muted);}
.rev-stars{color:#f59e0b;font-size:.82rem;letter-spacing:1px;}
.rev-text{font-size:.83rem;color:#444;line-height:1.6;margin:0;}
@media(max-width:768px){.trek-hero{height:300px;}.hero-title{font-size:1.85rem;}}
</style>
</head>
<body>
<div id="nav-placeholder"></div>

<div class="bc-bar"><div class="container">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="index.html">Home</a></li>
    <li class="breadcrumb-item"><a href="treks.html">Treks</a></li>
    <li class="breadcrumb-item active" id="bc-name">Trek</li>
  </ol>
</div></div>

<!-- HERO (injected by JS) -->
<div id="trek-hero"></div>

<!-- MAIN -->
<div style="padding:2rem 0 4rem;">
  <div class="container">
    <div class="row g-4">
      <div class="col-lg-8" id="trek-content"></div>
      <div class="col-lg-4" id="booking-sidebar"></div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="shared.js"></script>
<script>
renderNav(); renderFooter();
(async function(){
await window.tcReady;

const id = new URLSearchParams(location.search).get('id') || 'T001';
const t = getTrekById(id) || TREKS[0];

document.title = t.name + ' – Trek&Camp';
document.getElementById('bc-name').textContent = t.name;

// HERO
const hasInst = t.instances && t.instances.length > 0;
const firstInst = hasInst ? t.instances[0] : null;

document.getElementById('trek-hero').innerHTML = `
<div class="trek-hero">
  <img src="${t.img}" alt="${t.name}">
  <div class="trek-hero-overlay container">
    <div class="hero-diff-tag">${t.difficulty}</div>
    <h1 class="hero-title">${t.name}</h1>
    <div class="hero-meta">
      <span>📍 ${t.region}</span>
      <span>⏱ ${t.days} Day${t.days>1?'s':''}</span>
      <span>Next batch: ${hasInst ? firstInst.start + ' ' + new Date().getFullYear() : 'TBA'}</span>
    </div>
  </div>
</div>`;

// CONTENT
const slotsUsed = hasInst ? Math.max(0, t.maxGroup - firstInst.slots) : 0;
const slotsTotal = t.maxGroup || 20;
const slotsLeft = hasInst ? firstInst.slots : 0;
const pct = Math.round(slotsUsed/slotsTotal*100);

document.getElementById('trek-content').innerHTML = `
  <!-- STAT PILLS -->
  <div class="stat-pills">
    <div class="stat-pill"><div class="pill-icon"><svg width="15" height="15" fill="none" stroke="var(--brand)" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div><div><div class="pill-label">Duration</div><div class="pill-val">${t.days} Day${t.days>1?'s':''}</div></div></div>
    <div class="stat-pill"><div class="pill-icon"><svg width="15" height="15" fill="none" stroke="var(--brand)" stroke-width="2" viewBox="0 0 24 24"><path d="M3 17l6-6 4 4 8-8"/></svg></div><div><div class="pill-label">Max Altitude</div><div class="pill-val">${t.altitude}</div></div></div>
    <div class="stat-pill"><div class="pill-icon"><svg width="15" height="15" fill="none" stroke="var(--brand)" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div><div><div class="pill-label">Group Size</div><div class="pill-val">Max ${t.maxGroup}</div></div></div>
    <div class="stat-pill"><div class="pill-icon"><svg width="15" height="15" fill="none" stroke="var(--brand)" stroke-width="2" viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></div><div><div class="pill-label">Rating</div><div class="pill-val">${t.rating} / 5</div></div></div>
    <div class="stat-pill"><div class="pill-icon"><svg width="15" height="15" fill="none" stroke="var(--brand)" stroke-width="2" viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg></div><div><div class="pill-label">Transport From</div><div class="pill-val">${t.transport}</div></div></div>
  </div>
  <!-- OVERVIEW -->
  <div class="card-clean">
    <h2 class="card-sec-title">Overview</h2>
    <p style="color:#444;font-size:.92rem;line-height:1.78;">${t.desc}</p>
    <div class="mt-3">${t.tags.map(tag=>`<span class="tag">${tag}</span>`).join('')}</div>
  </div>
  <!-- ITINERARY -->
  <div class="card-clean">
    <h2 class="card-sec-title">Day-by-Day Itinerary</h2>
    ${t.itinerary.map((day,i)=>`
    <div class="itinerary-item">
      <div class="day-badge"><div class="dn">${i+1}</div><div class="dl">Day</div></div>
      <div class="itinerary-info"><h6>${day.title}</h6><p>${day.desc}</p></div>
    </div>`).join('')}
  </div>
  <!-- CAMPS -->
  <div class="card-clean">
    <h2 class="card-sec-title">Camp${t.camps.length>1?'s':''} on This Trek</h2>
    ${t.camps.map(c=>`
    <div class="camp-row">
      <div class="camp-icon"><svg width="17" height="17" fill="none" stroke="var(--brand)" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v9a1 1 0 001 1h4v-5h4v5h4a1 1 0 001-1v-9"/></svg></div>
      <div><h6>${c.name}</h6><p>Altitude: ${c.alt} · Capacity: ${c.cap} · ${c.fac}</p></div>
    </div>`).join('')}
  </div>
  <!-- GUIDE -->
  <div class="card-clean">
    <h2 class="card-sec-title">Your Guide</h2>
    <div class="guide-block">
      <div class="guide-avatar">${t.guide.name.split(' ').map(w=>w[0]).join('').substring(0,2)}</div>
      <div>
        <div style="font-weight:500;font-size:.92rem;">${t.guide.name}</div>
        <div style="font-size:.78rem;color:var(--text-muted);">${t.guide.exp} experience · ${t.guide.spec}</div>
        <span class="cert-badge">${t.guide.cert}</span><span class="cert-badge">First Aid</span>
      </div>
    </div>
  </div>
  <!-- REVIEWS (static, realistic) -->
  <div class="card-clean">
    <h2 class="card-sec-title">What Trekkers Say</h2>
    <div class="rev-card"><div class="rev-head"><div><div class="rev-name">Priya D.</div><div class="rev-stars">★★★★★</div></div><div class="rev-date">Mar 2026</div></div><p class="rev-text">Absolutely stunning experience. The guide was knowledgeable and patient. Camp arrangements were excellent.</p></div>
    <div class="rev-card"><div class="rev-head"><div><div class="rev-name">Amit K.</div><div class="rev-stars">★★★★★</div></div><div class="rev-date">Jan 2026</div></div><p class="rev-text">Well-organised end to end. The scenery was breathtaking. Already planning my next trek with Trek&Camp.</p></div>
    <div class="rev-card"><div class="rev-head"><div><div class="rev-name">Sneha J.</div><div class="rev-stars">★★★★☆</div></div><div class="rev-date">Dec 2025</div></div><p class="rev-text">Great experience overall. Minor suggestion: pack a light rain jacket even in winter — the fog can surprise you.</p></div>
  </div>`;

// BOOKING SIDEBAR
const instOptions = hasInst ? t.instances.map(inst=>`<option value="${inst.id}">${inst.start}${inst.start!==inst.end?' – '+inst.end:''}, ${new Date().getFullYear()} · ${inst.slots} spots left</option>`).join('') : '<option value="">No Batch Available</option>';
document.getElementById('booking-sidebar').innerHTML = `
<div class="booking-card">
  <div class="booking-header">
    <div class="price-big">₹${t.price.toLocaleString('en-IN')}</div>
    <div class="price-note">per person · all inclusive</div>
  </div>
  <div class="booking-body">
    <div class="d-flex justify-content-between align-items-start mb-1">
      <div style="font-size:.78rem;color:var(--text-muted);">Availability</div>
      <span style="font-size:.78rem;color:${slotsLeft<=5?'#dc2626':'var(--text-muted)'};">${slotsLeft} / ${slotsTotal} spots</span>
    </div>
    <div class="avail-bar mb-3"><div class="avail-fill" style="width:${pct}%;"></div></div>
    <div class="bf mb-3"><label>Select Batch</label><select id="batchSel">${instOptions}</select></div>
    <div class="bf mb-3"><label>Participants</label><input type="number" id="numP" min="1" max="6" value="1"></div>
    <div class="bf mb-2"><label>Special Requirements</label><input type="text" id="specReq" placeholder="Dietary needs, medical info…"></div>
    <hr style="border-color:var(--border);margin:1rem 0;">
    <div class="fee-row"><span>Base price × <span id="pNum">1</span></span><span id="baseAmt">₹${t.price.toLocaleString('en-IN')}</span></div>
    <div class="fee-row"><span>Transport & camps</span><span>Included</span></div>
    <div class="fee-row"><span>GST (5%)</span><span id="gstAmt">₹${Math.round(t.price*0.05).toLocaleString('en-IN')}</span></div>
    <div class="fee-total"><span>Total</span><span id="totalAmt">₹${Math.round(t.price*1.05).toLocaleString('en-IN')}</span></div>
    <a href="book_trek.html?id=${t.id}&instance=" id="bookBtn" class="btn-book-now">Continue to Book</a>
    <div class="guarantee">
      <svg width="13" height="13" fill="none" stroke="var(--brand)" stroke-width="2" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <p>Free cancellation up to 7 days before departure. Secure SSL payment.</p>
    </div>
  </div>
</div>`;

// Live price update + book link
const numPEl = document.getElementById('numP');
const batchEl = document.getElementById('batchSel');
function updatePrice(){
  const n = parseInt(numPEl.value)||1;
  const base = t.price*n;
  const gst = Math.round(base*0.05);
  document.getElementById('pNum').textContent=n;
  document.getElementById('baseAmt').textContent='₹'+base.toLocaleString('en-IN');
  document.getElementById('gstAmt').textContent='₹'+gst.toLocaleString('en-IN');
  document.getElementById('totalAmt').textContent='₹'+(base+gst).toLocaleString('en-IN');
  document.getElementById('bookBtn').href=`book_trek.html?id=${t.id}&instance=${batchEl.value}&participants=${n}&req=${encodeURIComponent(document.getElementById('specReq')?.value||'')}`;
}
numPEl.addEventListener('input',updatePrice);
batchEl.addEventListener('change',updatePrice);
})();
</script>
</body>
</html>
